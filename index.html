<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ממלכת החשבון 2026 - אלכסנדר זבודיסקר</title>
    
    <meta name="theme-color" content="#6C5CE7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ממלכת החשבון">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C5CE7'/><path d='M50 15 L85 30 L85 70 L50 85 L15 70 L15 30 Z' fill='%23F1C40F' stroke='%23333' stroke-width='3'/><text x='50' y='55' text-anchor='middle' font-size='30' font-weight='bold' fill='%23333' font-family='serif'>&pi;</text></svg>">
    
    <style>
        :root { --primary: #6C5CE7; --secondary: #00CEC9; --accent: #FDCB6E; --danger: #ff7675; --gold: #f1c40f; --text: #333; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 5px; font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; transition: background 0.8s; background: #0984E3;
            color: var(--text);
        }

        .bg-lvl-1 { background: #2ecc71; } .bg-lvl-2 { background: #3498db; } .bg-lvl-3 { background: #e67e22; }
        .bg-infinity { background: linear-gradient(45deg, #6c5ce7, #a29bfe); background-size: 400%; animation: grad 10s infinite; }
        @keyframes grad { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        #game-container {
            background: rgba(255, 255, 255, 0.98); border-radius: 20px; padding: 10px; 
            width: 95%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 5px; position: relative;
        }

        #menu-screen, #mode-selection { position: absolute; top:0; left:0; width:100%; height:100%; background: white; z-index: 100; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; padding: 15px; }
        #mode-selection { z-index: 101; display: none; }
        
        .menu-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: transform 0.1s; }
        .btn-reg { background: var(--primary); } .btn-time { background: var(--secondary); }
        .btn-gift { background: var(--gold); color: #333; }
        .btn-mixed { background: linear-gradient(to left, #6C5CE7, #00CEC9); position: relative; }
        .btn-mixed::after { content: "1.5x 💰"; position: absolute; top: -5px; left: -5px; background: red; color: white; font-size: 10px; padding: 2px 5px; border-radius: 5px; transform: rotate(-10deg); }
        .btn-install { background: #2d3436; color: white; display: block; border: 2px solid #636e72; font-size: 14px; }

        .top-nav { display: flex; justify-content: space-between; align-items: center; gap: 5px; }
        .home-btn { background: #eee; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; }

        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; font-size: 0.8rem; width: 100%; }
        #timer-box { font-size: 14px; color: var(--danger); font-weight: bold; display: none; }
        #lvl-progress-bg { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin: 4px 0; overflow: hidden; }
        #lvl-progress-bar { height: 100%; background: var(--secondary); width: 0%; transition: width 0.3s; }

        #monster-zone { height: 70px; font-size: 55px; display: flex; justify-content: center; align-items: center; position: relative; }
        .fire-effect { position: absolute; font-size: 25px; animation: rise 1s forwards; }
        @keyframes rise { 0% {bottom: 0; opacity: 1;} 100% {bottom: 60px; opacity: 0;} }

        #question-display { background: #F1F2F6; border-radius: 12px; padding: 10px; font-size: 32px; font-weight: 900; direction: ltr; margin-top: 5px; }
        #answer-view { font-size: 30px; color: var(--primary); min-height: 38px; border-bottom: 2px solid #ddd; margin: 5px 0; font-weight: bold; }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .num-btn { background: #F1F2F6; border: none; padding: 12px 0; font-size: 20px; font-weight: bold; border-radius: 10px; box-shadow: 0 3px 0 #ddd; color: var(--text); }
        #submit-btn { grid-column: span 3; background: var(--primary); color: white; padding: 12px; font-size: 22px; border-radius: 10px; border: none; font-weight: bold; margin-top: 3px; }

        #shop-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 20px; padding: 15px; z-index: 200; width: 300px; border: 3px solid var(--secondary); box-shadow: 0 0 30px rgba(0,0,0,0.4); max-height: 80vh; overflow-y: auto; }
        .char-card { display: inline-block; width: 60px; height: 75px; background: #f8f9fa; margin: 5px; border-radius: 10px; border: 2px solid #eee; position: relative; padding: 5px; cursor: pointer; }
        .char-card.locked { opacity: 0.4; cursor: not-allowed; background: #ddd; }
        .char-price { font-size: 10px; font-weight: bold; color: var(--gold); background: #333; border-radius: 5px; padding: 1px 3px; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 90%; text-align: center; }
        
        .copyright { font-size: 0.7rem; color: #95a5a6; margin-top: 5px; font-weight: bold; width: 100%; border-top: 1px solid #eee; padding-top: 3px; }
    </style>
</head>
<body id="main-body" class="bg-lvl-1">

<div id="game-container">
    <div id="menu-screen">
        <svg style="width:50px; height:50px" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#6C5CE7"/><text x="50" y="65" text-anchor="middle" font-size="40" font-weight="bold" fill="#F1C40F">&pi;</text></svg>
        <h2 style="margin:0; color: var(--primary); font-size: 24px;">ממלכת החשבון</h2>
        <button class="menu-btn btn-reg" onclick="showModes()">🌟 התחל משחק</button>
        <button id="gift-btn" class="menu-btn btn-gift" onclick="spinWheel()">🎁 טוען מתנה...</button>
        <button id="install-btn" class="menu-btn btn-install" onclick="handleInstall()">📥 התקן אפליקציה</button>
        <div class="copyright">©אלכסנדר זבודיסקר 2026©</div>
    </div>

    <div id="mode-selection">
        <h3>בחר סגנון:</h3>
        <button class="menu-btn btn-reg" onclick="startGame('plusminus', false)">➕/➖ חיבור וחיסור</button>
        <button class="menu-btn btn-time" onclick="startGame('plusminus', true)">⏱️ מרוץ נגד הזמן!</button>
        <button class="menu-btn btn-reg" style="background:#e67e22" onclick="startGame('multidiv', false)">✖️/➗ כפל וחילוק</button>
        <button class="menu-btn btn-mixed" onclick="startGame('mixed', false)">🎲 הכל מעורבב (בונוס!)</button>
        <button class="menu-btn" style="background:#636e72" onclick="goHome()">חזור</button>
    </div>

    <div class="top-nav">
        <button class="home-btn" onclick="goHome()">🏠</button>
        <div id="timer-box">⏱️ <span id="time-left">30</span></div>
        <div class="stats-bar">💰 <span id="score">0</span> | ❤️ <span id="lives-display">❤️❤️❤️</span></div>
    </div>
    
    <div id="lvl-progress-bg"><div id="lvl-progress-bar"></div></div>
    <div style="font-size: 0.7rem; font-weight: bold;">רמה: <span id="level-num">1</span></div>

    <div id="monster-zone"><div id="monster">🦁</div></div>
    <div id="question-display"><span id="n1"></span><span id="op"></span><span id="n2"></span>=</div>
    <div id="answer-view">?</div>

    <div class="numpad">
        <button class="num-btn" onclick="addNum(1)">1</button><button class="num-btn" onclick="addNum(2)">2</button><button class="num-btn" onclick="addNum(3)">3</button>
        <button class="num-btn" onclick="addNum(4)">4</button><button class="num-btn" onclick="addNum(5)">5</button><button class="num-btn" onclick="addNum(6)">6</button>
        <button class="num-btn" onclick="addNum(7)">7</button><button class="num-btn" onclick="addNum(8)">8</button><button class="num-btn" onclick="addNum(9)">9</button>
        <button class="num-btn" style="background:var(--accent)" onclick="addNum('-')">-</button><button class="num-btn" onclick="addNum(0)">0</button><button class="num-btn" style="background:var(--accent)" onclick="clearAns()">C</button>
        <button class="num-btn" style="grid-column: span 1; background:var(--gold)" onclick="toggleShop()">🛒</button>
        <button id="submit-btn" style="grid-column: span 2;" onclick="check()">בדוק!</button>
    </div>
</div>

<div id="shop-modal">
    <h3>חנות הגיבורים</h3>
    <div id="shop-items"></div>
    <button class="num-btn" style="width:100%; margin-top:10px;" onclick="toggleShop()">סגור</button>
</div>

<script>
    let score = parseInt(localStorage.getItem('math_gold')) || 0;
    let monster = localStorage.getItem('math_char') || '🦁';
    let myChars = JSON.parse(localStorage.getItem('math_my_chars')) || ['🦁'];
    let lastGiftTime = parseInt(localStorage.getItem('math_gift_time')) || 0;
    let level = 1, lives = 3, currentAns = "", correct = 0, isTimeMode = false, timeLeft = 30, timerInterval;
    let deferredPrompt, audioCtx;

    const charData = [{c:'🦁',l:1,p:0},{c:'🐱',l:1,p:20},{c:'🐶',l:2,p:30},{c:'🐙',l:5,p:60},{c:'🦄',l:10,p:150},{c:'🐲',l:25,p:500},{c:'🪐',l:50,p:2000}];

    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
    function handleInstall() {
        if (deferredPrompt) { deferredPrompt.prompt(); } 
        else { alert("להתקנה: לחץ על 'שיתוף' באייפון או על 3 הנקודות באנדרואיד ובחר 'הוסף למסך הבית'."); }
    }

    function showModes() { document.getElementById('mode-selection').style.display = 'flex'; }
    function startGame(mode, timed) {
        currentMode = mode; isTimeMode = timed; lives = 3; level = 1; timeLeft = 30;
        document.getElementById('mode-selection').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('timer-box').style.display = timed ? 'block' : 'none';
        if(timed) startTimer();
        updateStats(); generate();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timerInterval); alert("נגמר הזמן!"); goHome(); }
        }, 1000);
    }

    function generate() {
        let n1, n2, op, type = currentMode;
        if(type === 'mixed') type = Math.random() > 0.5 ? 'plusminus' : 'multidiv';
        if(type === 'plusminus') {
            op = Math.random() > 0.5 ? '+' : '-';
            n1 = Math.floor(Math.random() * (level * 5)) + 2; n2 = Math.floor(Math.random() * (level * 5)) + 2;
            if(op === '-' && level < 50 && n1 < n2) [n1, n2] = [n2, n1];
            correct = op === '+' ? n1 + n2 : n1 - n2;
        } else {
            op = Math.random() > 0.5 ? '×' : '÷';
            n2 = Math.floor(Math.random() * (level + 2)) + 1;
            let res = Math.floor(Math.random() * 10) + 1;
            if(op === '×') { n1 = Math.floor(Math.random() * (level + 2)) + 1; correct = n1 * n2; }
            else { n1 = n2 * res; correct = res; }
        }
        document.getElementById('n1').innerText = n1; document.getElementById('op').innerText = op; document.getElementById('n2').innerText = n2;
        currentAns = ""; updateView();
    }

    function check() {
        if(currentAns === "" || currentAns === "-") return;
        if(parseInt(currentAns) === correct) {
            score += currentMode === 'mixed' ? 15 : 10;
            if(isTimeMode) timeLeft += 3;
            if(score >= level * 100) { level++; showFire('🌟'); }
            playSnd(600); save(); updateStats(); generate();
        } else {
            lives--; if(lives <= 0) goHome();
            playSnd(150); updateStats();
        }
    }

    function updateStats() {
        document.getElementById('score').innerText = score;
        document.getElementById('lives-display').innerText = "❤️".repeat(lives);
        document.getElementById('level-num').innerText = level;
        document.getElementById('monster').innerText = monster;
        document.getElementById('lvl-progress-bar').style.width = (score % 100) + "%";
    }

    function toggleShop() {
        const m = document.getElementById('shop-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
        if(m.style.display === 'block') {
            document.getElementById('shop-items').innerHTML = charData.map(i => `
                <div class="char-card ${level<i.l?'locked':''}" onclick="attemptBuy('${i.c}',${i.p},${i.l})">
                    <div style="font-size:9px">${level<i.l?'רמה '+i.l:'פתוח'}</div>
                    <div style="font-size:30px;margin:5px">${level<i.l?'🔒':i.c}</div>
                    <div class="char-price">${myChars.includes(i.c)?'בבעלות':i.p+'💰'}</div>
                </div>`).join('');
        }
    }

    function attemptBuy(c,p,l) {
        if(level<l) return;
        if(myChars.includes(c)) { monster=c; save(); updateStats(); toggleShop(); return; }
        if(score>=p) { score-=p; myChars.push(c); monster=c; save(); updateStats(); toggleShop(); }
    }

    function updateGiftStatus() {
        const btn = document.getElementById('gift-btn');
        const wait = (lastGiftTime + 300000) - Date.now();
        if (wait <= 0) { btn.disabled = false; btn.innerText = "🎁 קבל מתנה!"; }
        else { btn.disabled = true; btn.innerText = `🎁 ${Math.floor(wait/60000)}:${Math.floor((wait%60000)/1000).toString().padStart(2,'0')}`; }
    }

    function spinWheel() { lastGiftTime = Date.now(); localStorage.setItem('math_gift_time', lastGiftTime); score += 50; save(); updateStats(); alert("קיבלת 50 זהב!"); }
    function save() { localStorage.setItem('math_gold', score); localStorage.setItem('math_char', monster); localStorage.setItem('math_my_chars', JSON.stringify(myChars)); }
    function goHome() { clearInterval(timerInterval); document.getElementById('menu-screen').style.display = 'flex'; document.getElementById('mode-selection').style.display = 'none'; updateStats(); }
    function addNum(n) { if(n==='-' && currentAns !== "") return; currentAns += n; updateView(); }
    function clearAns() { currentAns = ""; updateView(); }
    function updateView() { document.getElementById('answer-view').innerText = currentAns || "?"; }
    function showFire(e) { const f = document.createElement('div'); f.className='fire-effect'; f.innerText=e; document.getElementById('monster-zone').appendChild(f); setTimeout(()=>f.remove(),1000); }
    function playSnd(f) { if(!audioCtx) audioCtx = new AudioContext(); let o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.frequency.value=f; g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.1); }
    window.onload = () => { updateStats(); setInterval(updateGiftStatus, 1000); };
</script>
</body>
</html>
