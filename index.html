<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ממלכת החשבון 2026</title>
    <style>
        :root { --primary: #6C5CE7; --secondary: #00CEC9; --accent: #FDCB6E; }
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body { 
            margin: 0; padding: 5px; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            transition: background 1s ease;
        }
        .bg-lvl-1 { background: linear-gradient(to bottom, #2ecc71, #27ae60); }
        .bg-lvl-2 { background: linear-gradient(to bottom, #3498db, #2980b9); }
        .bg-lvl-3 { background: linear-gradient(to bottom, #e67e22, #d35400); }
        .bg-lvl-4 { background: linear-gradient(to bottom, #2c3e50, #000000); }

        #game-container {
            background: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 12px; width: 100%; max-width: 340px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative;
        }

        .stats-bar { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        #lives-display { color: #e74c3c; font-size: 1.1rem; letter-spacing: 2px; }

        #monster-zone { height: 80px; display: flex; justify-content: center; align-items: center; }
        #monster { font-size: 60px; transition: 0.3s; }
        
        /* עיצוב התרגיל למניעת בלבול */
        #question-display { 
            background: #F1F2F6; border-radius: 15px; padding: 10px; margin: 5px 0;
            font-size: 38px; font-weight: 900; 
            display: flex; flex-direction: row; justify-content: center; align-items: center;
            direction: ltr; /* מבטיח סדר: מספר, סימן, מספר */
        }
        .symbol { color: #636e72; margin: 0 5px; }

        #answer-view { font-size: 32px; color: var(--primary); min-height: 40px; border-bottom: 3px solid #DFE6E9; display: inline-block; min-width: 50px; }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 5px; }
        .num-btn { background: #F1F2F6; border: none; padding: 12px; font-size: 20px; font-weight: bold; border-radius: 12px; box-shadow: 0 3px 0 #DFE6E9; cursor: pointer; }
        .num-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #DFE6E9; }
        .action-btn { background: var(--accent) !important; box-shadow: 0 3px 0 #E17055 !important; }
        #submit-btn { grid-column: span 3; background: var(--primary); color: white; padding: 12px; font-size: 22px; border-radius: 12px; box-shadow: 0 4px 0 #4834D4; }

        .copyright { margin-top: 10px; font-size: 0.7rem; color: #7f8c8d; font-weight: bold; }

        #shop-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 25px; padding: 15px; z-index: 200; border: 4px solid var(--secondary); width: 280px; text-align: center; }
        .shop-heart { background: #ff7675 !important; color: white !important; padding: 10px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; border: none; font-weight: bold; width: 100%; }
    </style>
</head>
<body id="main-body" class="bg-lvl-1">

<div id="game-container">
    <div class="stats-bar">
        <span>💰 <span id="score">0</span></span>
        <span id="lives-display">❤️❤️❤️</span>
        <span>🌟 שלב <span id="level">1</span></span>
    </div>

    <div id="monster-zone">
        <div id="monster">🐲</div>
    </div>

    <div id="question-display">
        <span id="n1"></span>
        <span id="op" class="symbol"></span>
        <span id="n2"></span>
        <span class="symbol">=</span>
    </div>

    <div id="answer-view">?</div>

    <div class="numpad">
        <button class="num-btn" onclick="addNum(1)">1</button>
        <button class="num-btn" onclick="addNum(2)">2</button>
        <button class="num-btn" onclick="addNum(3)">3</button>
        <button class="num-btn" onclick="addNum(4)">4</button>
        <button class="num-btn" onclick="addNum(5)">5</button>
        <button class="num-btn" onclick="addNum(6)">6</button>
        <button class="num-btn" onclick="addNum(7)">7</button>
        <button class="num-btn" onclick="addNum(8)">8</button>
        <button class="num-btn" onclick="addNum(9)">9</button>
        <button class="num-btn action-btn" onclick="clearAns()">C</button>
        <button class="num-btn" onclick="addNum(0)">0</button>
        <button class="num-btn action-btn" onclick="toggleShop()">🛒</button>
        <button id="submit-btn" class="num-btn" onclick="check()">בדוק!</button>
    </div>

    <div class="copyright">©אלכסנדר זבודיסקר 2026©</div>
</div>

<div id="shop-modal">
    <h3 style="margin-top:0">חנות קסומה</h3>
    <button class="shop-heart" onclick="buyHeart()">❤️ קנה חיים (20 זהב)</button>
    <div id="shop-items"></div>
    <button class="num-btn" style="width:100%; margin-top:8px;" onclick="toggleShop()">סגור</button>
</div>

<script>
    let score = parseInt(localStorage.getItem('math_gold')) || 0;
    let level = 1;
    let lives = 3;
    let monster = localStorage.getItem('math_char') || '🐲';
    let count = 0;
    let currentAns = "";
    let correct = 0;

    const audio = new (window.AudioContext || window.webkitAudioContext)();

    function play(f, t, d=0.2) {
        try {
            const o = audio.createOscillator(), g = audio.createGain();
            o.type = t; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + d);
            o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + d);
        } catch(e) {}
    }

    function updateBackground() {
        const body = document.getElementById('main-body');
        body.className = '';
        if(level === 1) body.classList.add('bg-lvl-1');
        else if(level === 2) body.classList.add('bg-lvl-2');
        else if(level === 3) body.classList.add('bg-lvl-3');
        else body.classList.add('bg-lvl-4');
    }

    function generate() {
        count++;
        let isBoss = (count % 5 === 0);
        document.getElementById('game-container').style.borderColor = isBoss ? 'red' : 'transparent';
        
        let max = level * 10;
        if(isBoss) { 
            max *= 1.5; 
            document.getElementById('monster').innerText = '👹'; 
        } else { 
            document.getElementById('monster').innerText = monster; 
        }

        let n1 = Math.floor(Math.random() * max) + 1;
        let n2 = Math.floor(Math.random() * max) + 1;
        let ops = ['+', '-'];
        if(level > 2) ops.push('*');
        let op = ops[Math.floor(Math.random() * ops.length)];

        if(op === '-' && n1 < n2) [n1, n2] = [n2, n1];
        correct = (op === '+') ? n1+n2 : (op === '-') ? n1-n2 : n1*n2;

        document.getElementById('n1').innerText = n1;
        document.getElementById('op').innerText = op === '*' ? '×' : op;
        document.getElementById('n2').innerText = n2;
        currentAns = "";
        updateView();
        updateBackground();
    }

    function buyHeart() {
        if (score >= 20 && lives < 3) {
            score -= 20;
            lives++;
            localStorage.setItem('math_gold', score);
            updateStats();
            play(800, 'sine');
        } else if (lives >= 3) {
            alert("החיים שלך כבר מלאים!");
        } else {
            alert("אין לך מספיק זהב!");
        }
    }

    function addNum(n) { play(400, 'sine', 0.1); if(currentAns.length < 4) currentAns += n; updateView(); }
    function clearAns() { currentAns = ""; updateView(); }
    function updateView() { document.getElementById('answer-view').innerText = currentAns || "?"; }

    function check() {
        if(currentAns === "") return;
        if(parseInt(currentAns) === correct) {
            score += (count % 5 === 0) ? 50 : 10;
            play(600, 'sine');
            document.getElementById('monster').className = 'celebrate';
            
            // עולים רמה ומקבלים לב מתנה
            if(score >= level * 150) {
                level++;
                if(lives < 3) lives++;
            }
            
            localStorage.setItem('math_gold', score);
            setTimeout(() => {
                document.getElementById('monster').className = '';
                generate();
            }, 800);
        } else {
            lives--;
            play(150, 'sawtooth', 0.2);
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
            if(lives <= 0) {
                alert("Game Over! חוזרים להתחלה");
                lives = 3; level = 1; count = 0; score = Math.max(0, score - 50);
            }
            currentAns = ""; updateView();
        }
        updateStats();
    }

    function updateStats() {
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = level;
        document.getElementById('lives-display').innerText = "❤️".repeat(lives);
    }

    function toggleShop() {
        const m = document.getElementById('shop-modal');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        if(m.style.display === 'block') {
            const items = ['🦁','🤖','🦄','🦖','🐱','👽','🐸','👻','🦊','🐻'];
            document.getElementById('shop-items').innerHTML = items.map(i => 
                `<div class="num-btn" style="display:inline-block; margin:3px; font-size:30px; padding:8px; cursor:pointer" onclick="buyChar('${i}')">${i}</div>`
            ).join('');
        }
    }

    function buyChar(i) {
        if(score >= 50) {
            score -= 50; monster = i; 
            localStorage.setItem('math_gold', score);
            localStorage.setItem('math_char', monster);
            updateStats(); toggleShop();
            play(1000, 'sine');
            document.getElementById('monster').innerText = i;
        } else { alert("חסר זהב!"); }
    }

    window.onload = () => { updateStats(); generate(); };
</script>
</body>
</html>
