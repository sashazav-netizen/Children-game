<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ממלכת החשבון 2026 - אלכסנדר זבודיסקר</title>
    <style>
        :root { --primary: #6C5CE7; --secondary: #00CEC9; --accent: #FDCB6E; --danger: #ff7675; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 5px; font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; transition: background 0.8s; background: #0984E3;
        }

        .bg-lvl-1 { background: #2ecc71; } .bg-lvl-2 { background: #3498db; } .bg-lvl-3 { background: #e67e22; }
        .bg-infinity { background: linear-gradient(45deg, #6c5ce7, #a29bfe); background-size: 400%; animation: grad 10s infinite; }
        @keyframes grad { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        #game-container {
            background: rgba(255, 255, 255, 0.96); border-radius: 20px; padding: 10px; 
            width: 95%; max-width: 310px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 5px; position: relative;
        }

        #menu-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: white; z-index: 100; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; padding: 20px; }
        .menu-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; color: white; }
        .btn-reg { background: var(--primary); } .btn-time { background: var(--secondary); }

        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .home-btn { background: #eee; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; font-size: 0.8rem; width: 100%; }
        #timer-display { color: var(--danger); font-size: 1.1rem; display: none; font-weight: 900; }
        #shield-status { font-size: 0.7rem; color: var(--secondary); font-weight: bold; margin: 2px 0; }

        #monster-zone { height: 60px; font-size: 50px; display: flex; justify-content: center; align-items: center; }
        #question-display { background: #F1F2F6; border-radius: 12px; padding: 10px; font-size: 30px; font-weight: 900; direction: ltr; }
        #answer-view { font-size: 28px; color: var(--primary); min-height: 35px; border-bottom: 2px solid #ddd; margin: 5px 0; }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .num-btn { background: #F1F2F6; border: none; padding: 11px 0; font-size: 18px; font-weight: bold; border-radius: 10px; box-shadow: 0 3px 0 #ddd; }
        .num-btn:active { transform: translateY(2px); box-shadow: none; }
        .action-btn { background: var(--accent) !important; box-shadow: 0 3px 0 #e17055 !important; }
        #submit-btn { grid-column: span 3; background: var(--primary); color: white; padding: 12px; font-size: 20px; border-radius: 10px; margin-top: 2px; border: none; font-weight: bold; }

        #shop-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 20px; padding: 15px; z-index: 200; width: 280px; max-height: 70vh; overflow-y: auto; border: 3px solid var(--secondary); }
        .char-item { display: inline-block; margin: 4px; font-size: 20px; width: 45px; height: 45px; line-height: 45px; border-radius: 8px; background: #f1f2f6; position: relative; }
        .locked { opacity: 0.3; } .level-tag { font-size: 8px; position: absolute; bottom: 1px; width: 100%; left: 0; }
        .copyright { font-size: 0.7rem; color: #95a5a6; margin-top: 8px; font-weight: bold; border-top: 1px solid #eee; padding-top: 4px; width: 100%; }
    </style>
</head>
<body id="main-body" class="bg-lvl-1">

<div id="game-container">
    <div id="menu-screen">
        <h2 style="margin:0; color: var(--primary);">ממלכת החשבון</h2>
        <p style="font-size: 0.9rem; margin:0;">בחר מצב משחק:</p>
        <button class="menu-btn btn-reg" onclick="startMode('normal')">🌟 מסע אינסופי</button>
        <button class="menu-btn btn-time" onclick="startMode('time')">⏱️ מרוץ נגד הזמן</button>
        <div style="font-size: 0.8rem; color: #666; text-align: center; line-height: 1.4;">
            שיא מסע: שלב <span id="hi-lvl">1</span><br>שיא זמן: <span id="hi-time">0</span> תשובות
        </div>
        <div class="copyright">©אלכסנדר זבודיסקר 2026©</div>
    </div>

    <div class="top-nav">
        <button class="home-btn" onclick="goHome()">🏠</button>
        <div class="stats-bar">
            <span>💰 <span id="score">0</span></span>
            <span id="lives-display">❤️❤️❤️</span>
            <span id="timer-display">⏱️ 60</span>
        </div>
    </div>
    
    <div id="shield-status">🛡️ מגן פעיל!</div>
    
    <div style="font-weight: bold; font-size: 0.8rem;">
        <span id="mode-text">שלב</span>: <span id="level">1</span>
    </div>

    <div id="monster-zone"><div id="monster">🐲</div></div>
    <div id="question-display"><span id="n1"></span><span id="op"></span><span id="n2"></span>=</div>
    <div id="answer-view">?</div>

    <div class="numpad">
        <button class="num-btn" onclick="addNum(1)">1</button>
        <button class="num-btn" onclick="addNum(2)">2</button>
        <button class="num-btn" onclick="addNum(3)">3</button>
        <button class="num-btn" onclick="addNum(4)">4</button>
        <button class="num-btn" onclick="addNum(5)">5</button>
        <button class="num-btn" onclick="addNum(6)">6</button>
        <button class="num-btn" onclick="addNum(7)">7</button>
        <button class="num-btn" onclick="addNum(8)">8</button>
        <button class="num-btn" onclick="addNum(9)">9</button>
        <button class="num-btn action-btn" onclick="clearAns()">C</button>
        <button class="num-btn" onclick="addNum(0)">0</button>
        <button class="num-btn action-btn" onclick="toggleShop()">🛒</button>
        <button id="submit-btn" onclick="check()">בדוק!</button>
    </div>
    <div class="copyright">©אלכסנדר זבודיסקר 2026©</div>
</div>

<div id="shop-modal">
    <h4 style="margin:5px">חנות הבונוסים</h4>
    <button class="num-btn" style="width:100%; margin-bottom:5px; background: #ff7675; color:white; border:none;" onclick="buyItem('heart')">❤️ לב (20 זהב)</button>
    <button class="num-btn" style="width:100%; margin-bottom:10px; background: #00cec9; color:white; border:none;" onclick="buyItem('shield')">🛡️ מגן מטעויות (40 זהב)</button>
    <div id="shop-items"></div>
    <button class="num-btn" style="width:100%; margin-top:10px;" onclick="toggleShop()">סגור</button>
</div>

<script>
    let score = parseInt(localStorage.getItem('math_gold')) || 0;
    let hiLvl = parseInt(localStorage.getItem('hi_lvl')) || 1;
    let hiTime = parseInt(localStorage.getItem('hi_time')) || 0;
    let monster = localStorage.getItem('math_char') || '🐲';
    let gameMode = 'normal', level = 1, lives = 3, count = 0, currentAns = "", correct = 0, hasShield = false;
    let timeLeft = 60, timerInterval, audioCtx;

    const charList = [
        {char: '🦁', lvl: 1}, {char: '🐱', lvl: 1}, {char: '🐷', lvl: 2}, {char: '🐙', lvl: 4}, 
        {char: '🦄', lvl: 6}, {char: '👽', lvl: 8}, {char: '👑', lvl: 10}, {char: '🏛️', lvl: 12}, 
        {char: '👾', lvl: 15}, {char: '🔥', lvl: 18}, {char: '🐲', lvl: 20}, {char: '🪐', lvl: 25}
    ];

    function goHome() {
        clearInterval(timerInterval);
        document.getElementById('menu-screen').style.display = 'flex';
        updateStats();
    }

    function startMode(m) {
        gameMode = m; level = 1; lives = 3; count = 0; timeLeft = 60; hasShield = false;
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('timer-display').style.display = (m === 'time') ? 'block' : 'none';
        document.getElementById('lives-display').style.display = (m === 'normal') ? 'block' : 'none';
        document.getElementById('mode-text').innerText = (m === 'time') ? 'נקודות' : 'שלב';
        if(m === 'time') { 
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--; document.getElementById('timer-display').innerText = '⏱️ ' + timeLeft;
                if(timeLeft <= 0) endGame("הזמן נגמר! פתרת " + count + " תרגילים.");
            }, 1000);
        }
        updateStats(); generate();
    }

    function endGame(msg) {
        clearInterval(timerInterval);
        if(gameMode === 'time' && count > hiTime) { hiTime = count; localStorage.setItem('hi_time', hiTime); }
        if(gameMode === 'normal' && level > hiLvl) { hiLvl = level; localStorage.setItem('hi_lvl', hiLvl); }
        alert(msg); goHome();
    }

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSnd(f, t, d=0.1) { initAudio(); try { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = t; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); } catch(e) {} }

    function generate() {
        let diff = (gameMode === 'time') ? Math.floor(count/5)+1 : level;
        let max = diff * 10; let isBoss = (gameMode === 'normal' && (count+1) % 5 === 0);
        document.getElementById('monster').innerText = isBoss ? '👹' : monster;
        let n1 = Math.floor(Math.random() * max) + 1, n2 = Math.floor(Math.random() * max) + 1;
        let ops = (diff > 2) ? ['+', '-', '*'] : ['+', '-'];
        let op = ops[Math.floor(Math.random() * ops.length)];
        if(op === '-' && n1 < n2) [n1, n2] = [n2, n1];
        correct = op === '+' ? n1+n2 : op === '-' ? n1-n2 : n1*n2;
        document.getElementById('n1').innerText = n1; document.getElementById('op').innerText = op === '*' ? '×' : op; document.getElementById('n2').innerText = n2;
        currentAns = ""; updateView(); updateBG();
    }

    function check() {
        if(currentAns === "") return;
        if(parseInt(currentAns) === correct) {
            count++; score += (gameMode === 'normal' && count % 5 === 0) ? 50 : 10;
            if(gameMode === 'time') { timeLeft += 2; score += 5; }
            if(gameMode === 'normal' && score >= level * 150) level++;
            playSnd(600, 'sine'); generate();
        } else {
            if(hasShield) { hasShield = false; alert("המגן הציל אותך!"); }
            else {
                if(gameMode === 'normal') { lives--; if(lives <= 0) endGame("נגמרו הלבבות! הגעת לשלב " + level); }
                else { timeLeft -= 5; if(timeLeft <= 0) timeLeft = 0; }
                playSnd(150, 'sawtooth');
            }
        }
        save(); updateStats();
    }

    function buyItem(type) {
        if(type === 'heart' && score >= 20 && lives < 3) { score -= 20; lives++; }
        else if(type === 'shield' && score >= 40 && !hasShield) { score -= 40; hasShield = true; }
        else { alert("לא ניתן לקנות!"); return; }
        save(); updateStats(); toggleShop(); playSnd(800, 'sine');
    }

    function buyChar(c) { if(score >= 50) { score -= 50; monster = c; save(); updateStats(); toggleShop(); playSnd(1000, 'sine'); } }
    function addNum(n) { if(currentAns.length < 5) currentAns += n; updateView(); playSnd(440, 'sine', 0.05); }
    function clearAns() { currentAns = ""; updateView(); }
    function updateView() { document.getElementById('answer-view').innerText = currentAns || "?"; }
    function updateBG() { 
        const b = document.getElementById('main-body');
        let diff = (gameMode === 'time') ? Math.floor(count/5)+1 : level;
        if(diff > 20) b.className = 'bg-infinity';
        else b.className = diff < 3 ? 'bg-lvl-1' : diff < 7 ? 'bg-lvl-2' : 'bg-lvl-3';
    }
    function save() { localStorage.setItem('math_gold', score); localStorage.setItem('math_char', monster); }
    function updateStats() {
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = (gameMode === 'time') ? count : level;
        document.getElementById('lives-display').innerText = "❤️".repeat(lives);
        document.getElementById('shield-status').style.display = hasShield ? 'block' : 'none';
        document.getElementById('hi-lvl').innerText = hiLvl;
        document.getElementById('hi-time').innerText = hiTime;
    }
    function toggleShop() {
        const m = document.getElementById('shop-modal'); m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        if(m.style.display === 'block') {
            let currentLvl = (gameMode === 'time') ? Math.floor(count/5)+1 : level;
            document.getElementById('shop-items').innerHTML = charList.map(i => `
                <div class="char-item ${currentLvl < i.lvl ? 'locked' : ''}" onclick="${currentLvl < i.lvl ? '' : `buyChar('${i.char}')`}">
                    ${currentLvl < i.lvl ? '❓' : i.char}
                    <span class="level-tag">L${i.lvl}</span>
                </div>
            `).join('');
        }
    }
    window.onload = updateStats;
</script>
</body>
</html>
