<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ממלכת החשבון 2026</title>
    <style>
        :root { --primary: #6C5CE7; --secondary: #00CEC9; --accent: #FDCB6E; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 5px; font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: -webkit-fill-available; overflow: hidden;
            transition: background 0.8s ease; background: #0984E3;
        }

        .bg-lvl-1 { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .bg-lvl-2 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .bg-lvl-3 { background: linear-gradient(135deg, #e67e22, #d35400); }
        .bg-lvl-4 { background: linear-gradient(135deg, #2c3e50, #000000); }

        #game-container {
            background: rgba(255, 255, 255, 0.96); border-radius: 20px; 
            padding: 10px; width: 95%; max-width: 310px; 
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            position: relative; border: 3px solid transparent;
            display: flex; flex-direction: column; gap: 5px;
        }

        .stats-bar { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.85rem; margin-bottom: 2px; }
        #lives-display { color: #e74c3c; font-size: 1rem; letter-spacing: 1px; }

        #monster-zone { height: 70px; display: flex; justify-content: center; align-items: center; }
        #monster { font-size: 55px; transition: 0.3s; }
        
        @keyframes jump { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) translateY(-5px); } }
        .celebrate { animation: jump 0.5s ease; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        #question-display { 
            background: #F1F2F6; border-radius: 12px; padding: 8px;
            font-size: 32px; font-weight: 900; display: flex; direction: ltr; justify-content: center; align-items: center;
        }
        .symbol { color: #636e72; margin: 0 5px; }

        #answer-view { font-size: 28px; color: var(--primary); min-height: 35px; border-bottom: 2px solid #DFE6E9; display: inline-block; min-width: 50px; }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .num-btn { 
            background: #F1F2F6; border: none; padding: 10px 0; font-size: 18px; 
            font-weight: bold; border-radius: 10px; box-shadow: 0 3px 0 #DFE6E9; color: #2d3436;
        }
        .num-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #DFE6E9; }
        .action-btn { background: var(--accent) !important; box-shadow: 0 3px 0 #E17055 !important; }
        #submit-btn { grid-column: span 3; background: var(--primary); color: white; padding: 12px; font-size: 20px; border-radius: 10px; box-shadow: 0 4px 0 #4834D4; margin-top: 2px; }

        .copyright { margin-top: 5px; font-size: 0.65rem; color: #95a5a6; font-weight: bold; }

        #shop-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; border-radius: 20px; padding: 15px; z-index: 200; 
            border: 3px solid var(--secondary); width: 270px; text-align: center;
        }
        .shop-heart { background: #ff7675 !important; color: white !important; padding: 10px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: none; font-weight: bold; width: 100%; font-size: 14px; }
    </style>
</head>
<body id="main-body" class="bg-lvl-1">

<div id="game-container">
    <div class="stats-bar">
        <span>💰 <span id="score">0</span></span>
        <span id="lives-display">❤️❤️❤️</span>
        <span>🌟 ש' <span id="level">1</span></span>
    </div>
    <div id="monster-zone"><div id="monster">🐲</div></div>
    <div id="question-display">
        <span id="n1"></span><span id="op" class="symbol"></span><span id="n2"></span><span class="symbol">=</span>
    </div>
    <div id="answer-view">?</div>
    <div class="numpad">
        <button class="num-btn" onclick="addNum(1)">1</button>
        <button class="num-btn" onclick="addNum(2)">2</button>
        <button class="num-btn" onclick="addNum(3)">3</button>
        <button class="num-btn" onclick="addNum(4)">4</button>
        <button class="num-btn" onclick="addNum(5)">5</button>
        <button class="num-btn" onclick="addNum(6)">6</button>
        <button class="num-btn" onclick="addNum(7)">7</button>
        <button class="num-btn" onclick="addNum(8)">8</button>
        <button class="num-btn" onclick="addNum(9)">9</button>
        <button class="num-btn action-btn" onclick="clearAns()">C</button>
        <button class="num-btn" onclick="addNum(0)">0</button>
        <button class="num-btn action-btn" onclick="toggleShop()">🛒</button>
        <button id="submit-btn" class="num-btn" onclick="check()">בדוק!</button>
    </div>
    <div class="copyright">©אלכסנדר זבודיסקר 2026©</div>
</div>

<div id="shop-modal">
    <h4 style="margin:0 0 10px 0">חנות</h4>
    <button class="shop-heart" onclick="buyHeart()">❤️ לב (20 זהב)</button>
    <div id="shop-items"></div>
    <button class="num-btn" style="width:100%; margin-top:10px;" onclick="toggleShop()">סגור</button>
</div>

<script>
    let score = parseInt(localStorage.getItem('math_gold')) || 0;
    let level = 1, lives = 3, count = 0, currentAns = "", correct = 0;
    let monster = localStorage.getItem('math_char') || '🐲';
    let audioCtx;

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function play(f, t, d=0.15) {
        initAudio(); try { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = t; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); } catch(e) {}
    }

    function updateBackground() {
        const b = document.getElementById('main-body');
        b.className = level === 1 ? 'bg-lvl-1' : level === 2 ? 'bg-lvl-2' : level === 3 ? 'bg-lvl-3' : 'bg-lvl-4';
    }

    function generate() {
        count++; let isBoss = (count % 5 === 0);
        document.getElementById('game-container').style.borderColor = isBoss ? '#ff7675' : 'transparent';
        let max = level * 10; if(isBoss) { max *= 1.5; document.getElementById('monster').innerText = '👹'; } else { document.getElementById('monster').innerText = monster; }
        let n1 = Math.floor(Math.random() * max) + 1, n2 = Math.floor(Math.random() * max) + 1;
        let ops = ['+', '-']; if(level > 2) ops.push('*');
        let op = ops[Math.floor(Math.random() * ops.length)];
        if(op === '-' && n1 < n2) [n1, n2] = [n2, n1];
        correct = op === '+' ? n1+n2 : op === '-' ? n1-n2 : n1*n2;
        document.getElementById('n1').innerText = n1; document.getElementById('op').innerText = op === '*' ? '×' : op; document.getElementById('n2').innerText = n2;
        currentAns = ""; updateView(); updateBackground();
    }

    function buyHeart() { if (score >= 20 && lives < 3) { score -= 20; lives++; save(); updateStats(); play(800, 'sine'); } else { alert(lives >= 3 ? "מלא!" : "אין זהב!"); } }
    function addNum(n) { play(440, 'sine', 0.05); if(currentAns.length < 4) currentAns += n; updateView(); }
    function clearAns() { currentAns = ""; updateView(); }
    function updateView() { document.getElementById('answer-view').innerText = currentAns || "?"; }

    function check() {
        if(currentAns === "") return;
        if(parseInt(currentAns) === correct) {
            score += (count % 5 === 0) ? 50 : 10; play(600, 'sine');
            document.getElementById('monster').classList.add('celebrate');
            if(score >= level * 150) { level++; if(lives < 3) lives++; }
            save(); setTimeout(() => { document.getElementById('monster').classList.remove('celebrate'); generate(); }, 600);
        } else {
            lives--; play(150, 'sawtooth'); document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
            if(lives <= 0) { alert("Game Over!"); lives = 3; level = 1; count = 0; }
            currentAns = ""; updateView();
        }
        updateStats();
    }

    function save() { localStorage.setItem('math_gold', score); localStorage.setItem('math_char', monster); }
    function updateStats() { document.getElementById('score').innerText = score; document.getElementById('level').innerText = level; document.getElementById('lives-display').innerText = "❤️".repeat(lives); }
    
    function toggleShop() {
        const m = document.getElementById('shop-modal'); m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        if(m.style.display === 'block') {
            const items = ['🦁','🤖','🦄','🦖','🐱','👽','🐸','👻','🦊','🐻','🐙'];
            document.getElementById('shop-items').innerHTML = items.map(i => `<div class="num-btn" style="display:inline-block; margin:2px; font-size:22px; width:45px; cursor:pointer" onclick="buyChar('${i}')">${i}</div>`).join('');
        }
    }

    function buyChar(i) { if(score >= 50) { score -= 50; monster = i; save(); updateStats(); toggleShop(); play(1000, 'sine'); document.getElementById('monster').innerText = i; } else { alert("אין זהב!"); } }
    window.onload = () => { updateStats(); generate(); };
</script>
</body>
</html>
